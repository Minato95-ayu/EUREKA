apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eureka-ingress
  namespace: eureka
  labels:
    app: eureka
    app.kubernetes.io/name: eureka
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "50"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - eureka.example.com
      secretName: eureka-tls
  rules:
    - host: eureka.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: eureka-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eureka-frontend
                port:
                  number: 3000
