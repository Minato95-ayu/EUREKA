apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eureka-backend-hpa
  namespace: eureka
  labels:
    app: eureka-backend
    app.kubernetes.io/name: eureka-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eureka-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
