name: Eureka CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: eureka-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: eureka-backend
        run: |
          pytest -v

      - name: Frontend install
        working-directory: eureka-frontend
        run: npm ci

      - name: Frontend lint
        working-directory: eureka-frontend
        run: npm run lint

      - name: Frontend build
        working-directory: eureka-frontend
        run: npm run build

      - name: Frontend dependency audit
        working-directory: eureka-frontend
        run: npm audit --audit-level=moderate

      - name: Upload coverage to Codecov
        if: false
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-backend
          file: ./eureka-backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-frontend
          file: ./eureka-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install eureka ./helm/eureka \
            --namespace eureka \
            --create-namespace \
            --set image.backend.tag=${{ github.sha }} \
            --set image.frontend.tag=${{ github.sha }} \
            --wait \
            --timeout 10m

      - name: Verify rollout status
        run: |
          kubectl rollout status deployment/eureka-backend -n eureka --timeout=300s
          kubectl rollout status deployment/eureka-frontend -n eureka --timeout=300s

      - name: Run smoke test
        run: |
          BACKEND_POD=$(kubectl get pod -n eureka -l app=eureka-backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n eureka $BACKEND_POD -- curl -sf http://localhost:8000/health || exit 1
          echo "Smoke test passed!"
