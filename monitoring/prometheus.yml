global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: eureka-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
        labels:
          service: eureka-backend

  - job_name: eureka-frontend
    metrics_path: /metrics
    static_configs:
      - targets:
          - frontend:3000
        labels:
          service: eureka-frontend

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgresql

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
